# .github/workflows/deploy.yml
name: Deploy Portfolio Platform to GitHub Pages

on:
  push:
    branches:
      - main # Triggers compilation on pushes directly to main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Node.js Execution Environment
        uses: actions/preferred-node-version@v1
        with:
          node-version: '20'

      - name: Cache Node Modules Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Application Dependencies
        run: npm ci

      - name: Compile Optimized Production Build Asset Bundles
        run: npm run build

      - name: Deploy Production Assets into GitHub Pages Target Repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Pushes the compiled static app
          branch: main # Deploys straight to your main root branch for user domains
